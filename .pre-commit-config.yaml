repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
        exclude: node_modules
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --max-warnings=0 --no-warn-ignored
        language: system
        files: \.(js|jsx)$
        exclude: node_modules|backend/public|backend/coverage

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
