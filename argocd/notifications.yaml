apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Discord webhook service
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json
    body: |
      {
        "embeds": [{
          "title": "ArgoCD: {{.app.metadata.name}}",
          "description": "**Status:** {{.app.status.sync.status}}\n**Health:** {{.app.status.health.status}}\n**Revision:** {{.app.status.sync.revision}}",
          "color": {{if eq .app.status.sync.status "Synced"}}65280{{else}}16711680{{end}},
          "footer": {"text": "ArgoCD Notification"},
          "timestamp": "{{.app.status.operationState.finishedAt}}"
        }]
      }

  # Notification triggers
  trigger.on-sync-succeeded: |
    - when: app.status.sync.status == 'Synced' and app.status.health.status == 'Healthy'
      send: [app-sync-succeeded]
  trigger.on-sync-failed: |
    - when: app.status.sync.status == 'OutOfSync' or app.status.health.status == 'Degraded'
      send: [app-sync-failed]
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # Notification templates
  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
  template.app-sync-failed: |
    webhook:
      discord:
        method: POST
  template.app-health-degraded: |
    webhook:
      discord:
        method: POST

---
# SECURITY NOTE: Do NOT commit a real webhook URL here.
# Generate a SealedSecret with:
#   kubectl create secret generic argocd-notifications-secret \
#     --namespace argocd \
#     --from-literal=discord-webhook-url=https://discord.com/api/webhooks/YOUR_ID/YOUR_TOKEN \
#     --dry-run=client -o yaml | kubeseal --format yaml > argocd/notifications-secret.yaml
#
# The SealedSecret below contains only a placeholder — replace encryptedData with your sealed value.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  encryptedData:
    # Replace with output from kubeseal
    discord-webhook-url: SEALED_VALUE_PLACEHOLDER==
  template:
    metadata:
      name: argocd-notifications-secret
      namespace: argocd
    type: Opaque
